version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: inmobiliaria
      POSTGRES_PASSWORD: inmobiliaria_dev
      POSTGRES_DB: sistema_inmobiliaria
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inmobiliaria -d sistema_inmobiliaria"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://inmobiliaria:inmobiliaria_dev@db:5432/sistema_inmobiliaria"
      AUTH_SECRET: "${AUTH_SECRET:-change-me-in-production-generate-with-openssl}"
      AUTH_URL: "http://localhost:3000"
      CRON_SECRET: "${CRON_SECRET:-change-me-in-production}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
